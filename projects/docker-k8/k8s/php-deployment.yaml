apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-form-app
  namespace: ruby-form
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php-form-app
  template:
    metadata:
      labels:
        app: php-form-app
    spec:
      containers:
        - name: php-form-app
          image: your-dockerhub-username/php-form-app:latest
          ports:
            - containerPort: 80
          env:
            - name: DB_HOST
              value: mysql
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
